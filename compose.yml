version: "3.9"

services:
  web:
    build: .
    container_name: radarmapa_web
    ports:
      - "8080:80"
    restart: always
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: radarmapa_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: radar
      MYSQL_USER: radar
      MYSQL_PASSWORD: radar
